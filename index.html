<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bio-Metric OS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080a0d;
      --panel: rgba(255, 255, 255, 0.04);
      --border: rgba(255, 255, 255, 0.08);
      --accent: #00ffa3;
      --accent2: #ff4e6a;
      --accent3: #7c6ff7;
      --text: #c8d0dc;
      --muted: #5a6472;
      --bright: #eef2f7;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    .bm-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 2rem;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(8, 10, 13, 0.92);
      backdrop-filter: blur(12px);
      z-index: 10;
    }

    .bm-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 3px;
      color: var(--bright);
    }
    .bm-logo span { color: var(--accent); }

    .bm-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }
    .bm-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 1.8s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(0, 255, 163, 0.5); }
      50%       { opacity: 0.7; box-shadow: 0 0 0 6px rgba(0, 255, 163, 0); }
    }

    /* ── CONTROLS ── */
    .bm-controls {
      display: flex;
      gap: 12px;
      padding: 1rem 2rem;
      border-bottom: 1px solid var(--border);
      align-items: center;
    }

    .bm-select, .bm-input {
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--bright);
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      padding: 10px 14px;
      border-radius: 7px;
      outline: none;
      letter-spacing: 0.5px;
      transition: border-color 0.2s;
    }
    .bm-select { flex: 1; cursor: pointer; }
    .bm-input  { width: 160px; }
    .bm-select:focus, .bm-input:focus { border-color: var(--accent); }
    .bm-input::placeholder { color: var(--muted); }

    /* ── MAIN LAYOUT ── */
    .bm-main {
      display: grid;
      grid-template-columns: 1fr 200px;
      min-height: calc(100vh - 120px);
    }

    /* ── VIEWPORT ── */
    .bm-viewport {
      padding: 1.5rem 2rem;
      border-right: 1px solid var(--border);
      transition: opacity 0.35s ease;
    }
    .bm-viewport.fading { opacity: 0; }

    .bm-init {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 16px;
      min-height: 300px;
    }
    .bm-init-icon {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3.5rem;
      color: rgba(255,255,255,0.06);
      letter-spacing: 6px;
    }
    .bm-init-txt {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 1.5px;
      text-align: center;
      line-height: 2;
      text-transform: uppercase;
    }

    /* ── PROTOCOL HEADER ── */
    .proto-header {
      margin-bottom: 1.2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    .proto-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 3px;
      color: var(--bright);
      line-height: 1;
    }
    .proto-status {
      display: inline-block;
      margin-top: 6px;
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid rgba(0, 255, 163, 0.25);
      padding: 4px 10px;
      border-radius: 4px;
    }

    /* ── WORKOUT CARDS ── */
    .workout-grid { display: flex; flex-direction: column; gap: 12px; }

    .workout-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent3);
      border-radius: 10px;
      padding: 1rem 1.2rem;
      transition: border-color 0.4s, box-shadow 0.4s, transform 0.2s;
    }
    .workout-card:hover { transform: translateX(2px); }
    .workout-card.done {
      border-left-color: var(--accent);
      box-shadow: 0 0 20px -6px rgba(0, 255, 163, 0.25);
    }

    .card-exname {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.25rem;
      letter-spacing: 2px;
      color: var(--bright);
      margin-bottom: 8px;
    }

    .card-metrics {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .metric-chip {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      padding: 3px 9px;
      border-radius: 5px;
      color: var(--text);
      letter-spacing: 0.5px;
    }
    .metric-chip b { color: var(--bright); }

    .card-cues {
      font-size: 0.73rem;
      color: var(--muted);
      margin-bottom: 12px;
      line-height: 1.6;
      font-style: italic;
    }
    .cue-dot { color: var(--accent3); margin: 0 6px; }

    .set-btn {
      background: transparent;
      border: 1px solid rgba(124, 111, 247, 0.4);
      color: var(--accent3);
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 1px;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
    }
    .set-btn:hover { background: rgba(124, 111, 247, 0.12); border-color: var(--accent3); }
    .set-btn.done { border-color: rgba(0, 255, 163, 0.4); color: var(--accent); background: rgba(0, 255, 163, 0.06); }
    .set-btn:active { transform: scale(0.97); }

    /* ── SIDEBAR ── */
    .bm-sidebar { display: flex; flex-direction: column; }

    .sidebar-section {
      padding: 1.2rem 1rem;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-title {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 1rem;
    }

    /* ── SVG MUSCLE MAP ── */
    .svg-wrap {
      background: rgba(255,255,255,0.02);
      border-radius: 10px;
      padding: 10px;
      display: flex;
      justify-content: center;
    }
    svg#hmap { width: 140px; height: auto; }

    .muscle-grp {
      fill: #1e2530;
      transition: fill 0.5s ease, filter 0.5s ease;
    }
    .muscle-grp.active {
      fill: var(--accent);
      filter: drop-shadow(0 0 6px rgba(0, 255, 163, 0.6));
    }

    /* ── SESSION STATS ── */
    .session-stats { display: flex; flex-direction: column; gap: 10px; }
    .stat-row { display: flex; justify-content: space-between; align-items: center; }
    .stat-key {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.5px;
    }
    .stat-val {
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      color: var(--accent);
      font-weight: 500;
    }

    .rpe-bar-bg {
      background: rgba(255,255,255,0.06);
      border-radius: 2px;
      height: 4px;
      overflow: hidden;
      margin-top: 5px;
    }
    .rpe-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent3), var(--accent2));
      border-radius: 2px;
      transition: width 0.7s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .rpe-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.55rem;
      color: var(--muted);
      margin-top: 3px;
      letter-spacing: 0.5px;
    }

    /* ── FOOTER ── */
    .bm-footer {
      padding: 0.8rem 2rem;
      border-top: 1px solid var(--border);
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 1px;
      text-align: center;
    }
  </style>
</head>
<body>

  <header class="bm-header">
    <div class="bm-logo">BIO-METRIC <span>OS</span></div>
    <div class="bm-status">
      <div class="bm-dot"></div>
      <span id="sys-status">SYSTEM READY</span>
    </div>
  </header>

  <div class="bm-controls">
    <select class="bm-select" id="proto-sel">
      <option value="">— SELECT PROTOCOL —</option>
      <option value="bodybuilder">HYPERTROPHY / BODYBUILDER</option>
      <option value="powerlifter">CNS INTENSITY / POWERLIFTER</option>
      <option value="calisthenics">NEUROMUSCULAR / CALISTHENICS</option>
    </select>
    <input class="bm-input" type="number" id="wt-input" placeholder="Load (kg)" min="0">
  </div>

  <div class="bm-main">

    <!-- Dynamic Viewport -->
    <div class="bm-viewport" id="viewport">
      <div class="bm-init">
        <div class="bm-init-icon">▶ INIT</div>
        <div class="bm-init-txt">Select a protocol above<br>to initialize diagnostic matrix</div>
      </div>
    </div>

    <!-- Sidebar -->
    <div class="bm-sidebar">

      <div class="sidebar-section">
        <div class="sidebar-title">Muscle Map</div>
        <div class="svg-wrap">
          <svg id="hmap" viewBox="0 0 80 160" xmlns="http://www.w3.org/2000/svg">
            <!-- Head -->
            <ellipse cx="40" cy="10" rx="10" ry="9" fill="#1a2030" stroke="#2a3040" stroke-width="0.5"/>
            <!-- Neck -->
            <rect x="36" y="19" width="8" height="5" rx="2" fill="#1a2030" stroke="#2a3040" stroke-width="0.3"/>
            <!-- Shoulders -->
            <ellipse id="m-shoulders" cx="40" cy="29" rx="18" ry="6" class="muscle-grp"/>
            <!-- Chest -->
            <ellipse id="m-chest" cx="40" cy="38" rx="12" ry="7" class="muscle-grp"/>
            <!-- Lats -->
            <rect id="m-lats" x="23" y="32" width="7" height="20" rx="3" class="muscle-grp"/>
            <rect id="m-lats-r" x="50" y="32" width="7" height="20" rx="3" class="muscle-grp"/>
            <!-- Core / Abs -->
            <ellipse id="m-core" cx="40" cy="54" rx="8" ry="6" class="muscle-grp"/>
            <!-- Triceps -->
            <rect id="m-triceps" x="17" y="34" width="5" height="16" rx="2.5" class="muscle-grp"/>
            <rect id="m-triceps-r" x="58" y="34" width="5" height="16" rx="2.5" class="muscle-grp"/>
            <!-- Biceps -->
            <rect id="m-biceps" x="14" y="34" width="4" height="14" rx="2" class="muscle-grp"/>
            <rect id="m-biceps-r" x="62" y="34" width="4" height="14" rx="2" class="muscle-grp"/>
            <!-- Forearms -->
            <rect x="15" y="50" width="4" height="14" rx="2" fill="#1a2030" stroke="#2a3040" stroke-width="0.3"/>
            <rect x="61" y="50" width="4" height="14" rx="2" fill="#1a2030" stroke="#2a3040" stroke-width="0.3"/>
            <!-- Hips -->
            <rect x="30" y="62" width="20" height="5" rx="2" fill="#1a2030" stroke="#2a3040" stroke-width="0.3"/>
            <!-- Lower Back -->
            <rect id="m-lower_back" x="33" y="58" width="14" height="10" rx="3" class="muscle-grp"/>
            <!-- Glutes -->
            <ellipse id="m-glutes" cx="40" cy="71" rx="12" ry="7" class="muscle-grp"/>
            <!-- Quads -->
            <rect id="m-quads" x="28" y="77" width="10" height="28" rx="5" class="muscle-grp"/>
            <rect id="m-quads-r" x="42" y="77" width="10" height="28" rx="5" class="muscle-grp"/>
            <!-- Hamstrings (calves area) -->
            <rect x="29" y="107" width="9" height="22" rx="4" fill="#1a2030" stroke="#2a3040" stroke-width="0.3"/>
            <rect x="42" y="107" width="9" height="22" rx="4" fill="#1a2030" stroke="#2a3040" stroke-width="0.3"/>
            <!-- Calves -->
            <rect x="29" y="130" width="9" height="16" rx="3" fill="#1a2030" stroke="#2a3040" stroke-width="0.3"/>
            <rect x="42" y="130" width="9" height="16" rx="3" fill="#1a2030" stroke="#2a3040" stroke-width="0.3"/>
            <!-- Feet -->
            <rect x="28" y="146" width="11" height="10" rx="2" fill="#1a2030" stroke="#2a3040" stroke-width="0.3"/>
            <rect x="41" y="146" width="11" height="10" rx="2" fill="#1a2030" stroke="#2a3040" stroke-width="0.3"/>
          </svg>
        </div>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-title">Session</div>
        <div class="session-stats">
          <div class="stat-row">
            <span class="stat-key">Sets Done</span>
            <span class="stat-val" id="stat-sets">0</span>
          </div>
          <div class="stat-row">
            <span class="stat-key">Volume</span>
            <span class="stat-val" id="stat-vol">—</span>
          </div>
          <div>
            <div class="stat-row">
              <span class="stat-key">Avg RPE</span>
              <span class="stat-val" id="stat-rpe">—</span>
            </div>
            <div class="rpe-bar-bg"><div class="rpe-bar-fill" id="rpe-bar" style="width:0%"></div></div>
            <div class="rpe-label" id="rpe-label">—</div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <footer class="bm-footer">BIO-METRIC OS · TRAINING INTELLIGENCE SYSTEM · v2.0</footer>

  <script>
    const DB = {
      protocols: {
        bodybuilder: {
          label: "Hypertrophy Protocol",
          physiologyStatus: "High-Volume Metabolic Stress",
          targetedMuscles: ["chest", "triceps", "shoulders"],
          workoutBlocks: [
            { exercise: "Incline Dumbbell Press", tempo: "3-1-2-1", rpe: 8, reps: "10-12", cues: ["Retract scapula", "Deep stretch at bottom"] },
            { exercise: "Lateral Raises",         tempo: "2-0-2-2", rpe: 9, reps: "15-20", cues: ["Lead with elbows", "Pinkies up"] },
            { exercise: "Cable Chest Fly",        tempo: "2-1-2-0", rpe: 8, reps: "12-15", cues: ["Full ROM stretch", "Squeeze at peak"] }
          ]
        },
        powerlifter: {
          label: "CNS Intensity Protocol",
          physiologyStatus: "Maximum Motor Unit Recruitment",
          targetedMuscles: ["quads", "glutes", "lower_back"],
          workoutBlocks: [
            { exercise: "Low Bar Back Squat",   tempo: "2-0-X-0", rpe: 9, reps: "3-5", cues: ["Drive through mid-foot", "Brace hard"] },
            { exercise: "Romanian Deadlift",    tempo: "3-0-1-0", rpe: 8, reps: "4-6", cues: ["Hinge at hip", "Bar close to body"] }
          ]
        },
        calisthenics: {
          label: "Neuromuscular Skill Protocol",
          physiologyStatus: "Proprioceptive Mastery",
          targetedMuscles: ["lats", "biceps", "core"],
          workoutBlocks: [
            { exercise: "Muscle Up Progression", tempo: "Explosive", rpe: 7, reps: "5",     cues: ["False grip", "Chest over bar"] },
            { exercise: "L-Sit Hold",            tempo: "Static",   rpe: 7, reps: "3×15s", cues: ["Depress scapula", "Legs parallel"] },
            { exercise: "Weighted Pull-up",      tempo: "2-1-2-0",  rpe: 8, reps: "5-6",   cues: ["Elbows to pockets", "Full hang"] }
          ]
        }
      }
    };

    // Maps JSON muscle keys → SVG element IDs
    const muscleMap = {
      chest:      ["m-chest"],
      triceps:    ["m-triceps", "m-triceps-r"],
      shoulders:  ["m-shoulders"],
      quads:      ["m-quads", "m-quads-r"],
      glutes:     ["m-glutes"],
      lower_back: ["m-lower_back"],
      lats:       ["m-lats", "m-lats-r"],
      biceps:     ["m-biceps", "m-biceps-r"],
      core:       ["m-core"]
    };

    let state = { protocol: null, doneSets: new Set(), totalVol: 0 };

    function setStatus(txt) {
      document.getElementById('sys-status').textContent = txt;
    }

    function getRPELabel(rpe) {
      if (rpe <= 5) return 'Easy';
      if (rpe <= 7) return 'Moderate';
      if (rpe <= 8) return 'Hard';
      if (rpe <= 9) return 'Very Hard';
      return 'Max Effort';
    }

    function updateMap(targets) {
      document.querySelectorAll('.muscle-grp').forEach(el => el.classList.remove('active'));
      targets.forEach(t => {
        (muscleMap[t] || []).forEach(id => {
          const el = document.getElementById(id);
          if (el) el.classList.add('active');
        });
      });
    }

    function updateStats() {
      const wt = parseFloat(document.getElementById('wt-input').value) || 0;
      document.getElementById('stat-sets').textContent = state.doneSets.size;
      document.getElementById('stat-vol').textContent = state.totalVol > 0
        ? state.totalVol.toFixed(0) + ' kg'
        : (wt > 0 ? '0 kg' : '—');
    }

    function renderProtocol(key) {
      const vp = document.getElementById('viewport');
      vp.classList.add('fading');
      state.doneSets.clear();
      state.totalVol = 0;
      updateStats();

      setTimeout(() => {
        const p = DB.protocols[key];
        state.protocol = p;
        const maxRPE = Math.max(...p.workoutBlocks.map(b => b.rpe));

        vp.innerHTML = `
          <div class="proto-header">
            <div class="proto-label">${p.label}</div>
            <div class="proto-status">${p.physiologyStatus}</div>
          </div>
          <div class="workout-grid">
            ${p.workoutBlocks.map((b, i) => `
              <div class="workout-card" id="card-${i}">
                <div class="card-exname">${b.exercise}</div>
                <div class="card-metrics">
                  <span class="metric-chip"><b>RPE</b> ${b.rpe}</span>
                  <span class="metric-chip"><b>REPS</b> ${b.reps}</span>
                  <span class="metric-chip"><b>TEMPO</b> ${b.tempo}</span>
                </div>
                <div class="card-cues">${b.cues.map(c => `<span>${c}</span>`).join('<span class="cue-dot">·</span>')}</div>
                <button class="set-btn" id="btn-${i}" onclick="logSet(${i})">✓ Log Set</button>
              </div>
            `).join('')}
          </div>
        `;

        vp.classList.remove('fading');
        updateMap(p.targetedMuscles);
        document.getElementById('rpe-bar').style.width = (maxRPE / 10 * 100) + '%';
        document.getElementById('stat-rpe').textContent = maxRPE + '/10';
        document.getElementById('rpe-label').textContent = getRPELabel(maxRPE);
        setStatus('PROTOCOL LOADED');
      }, 350);
    }

    function logSet(i) {
      const wt = parseFloat(document.getElementById('wt-input').value) || 0;
      const block = state.protocol.workoutBlocks[i];
      if (!state.doneSets.has(i)) {
        state.doneSets.add(i);
        const repsMid = parseInt(block.reps) || 5;
        state.totalVol += repsMid * wt;
        document.getElementById('card-' + i).classList.add('done');
        const btn = document.getElementById('btn-' + i);
        btn.classList.add('done');
        btn.textContent = '✓ Done';
        updateStats();
        setStatus('SET LOGGED · ' + state.doneSets.size + ' COMPLETE');
      }
    }

    document.getElementById('proto-sel').addEventListener('change', e => {
      if (e.target.value) renderProtocol(e.target.value);
    });
    document.getElementById('wt-input').addEventListener('input', updateStats);
  </script>

</body>
</html>
